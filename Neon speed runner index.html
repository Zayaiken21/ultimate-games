<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Neon Speed Runner 3D</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050711;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      touch-action: none;
    }
    canvas { display: block; width: 100vw; height: 100vh; }

    .hud {
      position: fixed;
      top: env(safe-area-inset-top, 0px);
      left: 0;
      width: 100%;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 5;
      pointer-events: none;
      text-shadow: 0 2px 12px rgba(0,0,0,.8);
    }
    .pill {
      background: rgba(10, 15, 35, .65);
      border: 1px solid rgba(255,255,255,.16);
      backdrop-filter: blur(12px);
      border-radius: 999px;
      padding: 9px 13px;
      font-weight: 800;
      letter-spacing: .3px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    .center-screen {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 10;
      background: radial-gradient(circle at center, rgba(0, 220, 255, .12), rgba(5, 7, 17, .92) 58%);
      padding: 24px;
      text-align: center;
    }
    .card {
      width: min(430px, 94vw);
      padding: 26px 22px;
      border-radius: 28px;
      background: rgba(8, 12, 30, .78);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 30px 90px rgba(0,0,0,.55), inset 0 0 40px rgba(0, 230, 255, .05);
      backdrop-filter: blur(14px);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 9vw, 3.8rem);
      line-height: .95;
      letter-spacing: -1px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #8dfcff, #fb4dff, #ffd166);
      -webkit-background-clip: text;
      color: transparent;
    }
    p { margin: 10px 0 18px; color: #dbe7ff; line-height: 1.45; }
    button {
      border: 0;
      border-radius: 18px;
      padding: 15px 22px;
      font-weight: 900;
      font-size: 1rem;
      color: #07101e;
      background: linear-gradient(135deg, #8dfcff, #fb4dff 55%, #ffd166);
      box-shadow: 0 12px 32px rgba(251,77,255,.3);
      cursor: pointer;
      width: 100%;
    }
    .controls {
      position: fixed;
      bottom: calc(18px + env(safe-area-inset-bottom, 0px));
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 18px;
      z-index: 6;
      pointer-events: none;
    }
    .control-btn {
      pointer-events: auto;
      width: 74px;
      height: 74px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: white;
      font-size: 2rem;
      font-weight: 900;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      user-select: none;
    }
    .tiny { font-size: .82rem; opacity: .78; margin-top: 14px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="hud">
    <div class="pill">Score: <span id="score">0</span></div>
    <div class="pill">Speed: <span id="speed">1</span>x</div>
  </div>

  <div class="controls">
    <div class="control-btn" id="leftBtn">‹</div>
    <div class="control-btn" id="rightBtn">›</div>
  </div>

  <div class="center-screen" id="startScreen">
    <div class="card">
      <h1>Neon Speed Runner</h1>
      <p>Dodge glowing blocks, survive as the tunnel gets faster, and chase the highest score.</p>
      <button id="startBtn">START GAME</button>
      <div class="tiny">Phone: tap left/right buttons or swipe. Keyboard: A/D or arrows.</div>
    </div>
  </div>

  <div class="center-screen hidden" id="gameOverScreen">
    <div class="card">
      <h1>Game Over</h1>
      <p>Your score: <strong id="finalScore">0</strong></p>
      <button id="restartBtn">PLAY AGAIN</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    const scoreEl = document.getElementById('score');
    const speedEl = document.getElementById('speed');
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const finalScoreEl = document.getElementById('finalScore');

    let scene, camera, renderer, player, clock;
    let obstacles = [];
    let roadLines = [];
    let stars = [];
    let running = false;
    let score = 0;
    let speed = 0.55;
    let spawnTimer = 0;
    let targetLane = 0;
    let lane = 0;
    const lanes = [-2.2, 0, 2.2];

    function init3D() {
      scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x050711, 0.045);

      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 4.1, 7.4);
      camera.lookAt(0, 0.6, -6);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.7));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = false;
      document.body.appendChild(renderer.domElement);

      const ambient = new THREE.AmbientLight(0xffffff, 1.1);
      scene.add(ambient);

      const point = new THREE.PointLight(0x66ffff, 4, 40);
      point.position.set(0, 6, 3);
      scene.add(point);

      createWorld();
      createPlayer();
      clock = new THREE.Clock();
      window.addEventListener('resize', onResize);
    }

    function createWorld() {
      const roadGeo = new THREE.BoxGeometry(7.2, .12, 90);
      const roadMat = new THREE.MeshStandardMaterial({ color: 0x101733, metalness: .4, roughness: .45 });
      const road = new THREE.Mesh(roadGeo, roadMat);
      road.position.set(0, -0.08, -32);
      scene.add(road);

      const railGeo = new THREE.BoxGeometry(.16, .35, 90);
      const railMat = new THREE.MeshStandardMaterial({ color: 0x00f0ff, emissive: 0x00bfff, emissiveIntensity: 1.8 });
      [-3.75, 3.75].forEach(x => {
        const rail = new THREE.Mesh(railGeo, railMat);
        rail.position.set(x, .15, -32);
        scene.add(rail);
      });

      const lineMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x8dfcff, emissiveIntensity: 1.1 });
      for (let i = 0; i < 24; i++) {
        [-1.1, 1.1].forEach(x => {
          const line = new THREE.Mesh(new THREE.BoxGeometry(.06, .04, 1.15), lineMat);
          line.position.set(x, .04, -i * 4);
          scene.add(line);
          roadLines.push(line);
        });
      }

      const starGeo = new THREE.SphereGeometry(.035, 8, 8);
      const starMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
      for (let i = 0; i < 90; i++) {
        const star = new THREE.Mesh(starGeo, starMat);
        star.position.set((Math.random() - .5) * 30, Math.random() * 13 + 1.8, -Math.random() * 80);
        scene.add(star);
        stars.push(star);
      }
    }

    function createPlayer() {
      const group = new THREE.Group();
      const body = new THREE.Mesh(
        new THREE.BoxGeometry(1.05, .55, 1.55),
        new THREE.MeshStandardMaterial({ color: 0xff2cff, emissive: 0x8c008e, emissiveIntensity: .9, metalness: .35, roughness: .25 })
      );
      body.position.y = .38;
      group.add(body);

      const cockpit = new THREE.Mesh(
        new THREE.BoxGeometry(.62, .36, .55),
        new THREE.MeshStandardMaterial({ color: 0x8dfcff, emissive: 0x00d5ff, emissiveIntensity: 1.3, roughness: .1 })
      );
      cockpit.position.set(0, .83, -.12);
      group.add(cockpit);

      const wheelGeo = new THREE.CylinderGeometry(.22, .22, .18, 16);
      const wheelMat = new THREE.MeshStandardMaterial({ color: 0x0a0d18, metalness: .6, roughness: .35 });
      [[-.58,.12,.48],[.58,.12,.48],[-.58,.12,-.52],[.58,.12,-.52]].forEach(p => {
        const w = new THREE.Mesh(wheelGeo, wheelMat);
        w.rotation.z = Math.PI / 2;
        w.position.set(...p);
        group.add(w);
      });

      group.position.set(0, 0, 2.6);
      scene.add(group);
      player = group;
    }

    function spawnObstacle() {
      const laneIndex = Math.floor(Math.random() * 3);
      const colors = [0xff4141, 0xffd166, 0x8dfcff, 0x7c4dff];
      const mat = new THREE.MeshStandardMaterial({
        color: colors[Math.floor(Math.random() * colors.length)],
        emissive: 0xff1144,
        emissiveIntensity: .55,
        metalness: .2,
        roughness: .35
      });
      const height = .75 + Math.random() * .9;
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(1.25, height, 1.25), mat);
      mesh.position.set(lanes[laneIndex], height / 2, -52);
      mesh.rotation.y = Math.random() * Math.PI;
      scene.add(mesh);
      obstacles.push(mesh);
    }

    function resetGame() {
      obstacles.forEach(o => scene.remove(o));
      obstacles = [];
      score = 0;
      speed = 0.55;
      spawnTimer = 0;
      lane = 0;
      targetLane = 0;
      player.position.x = 0;
      scoreEl.textContent = '0';
      speedEl.textContent = '1';
      running = true;
      clock.getDelta();
    }

    function moveLeft() { targetLane = Math.max(0, targetLane - 1); }
    function moveRight() { targetLane = Math.min(2, targetLane + 1); }

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock ? clock.getDelta() : 0.016, 0.033);

      if (running) {
        score += dt * 120 * (1 + speed);
        speed += dt * 0.018;
        scoreEl.textContent = Math.floor(score);
        speedEl.textContent = (1 + speed).toFixed(1);

        const desiredX = lanes[targetLane];
        player.position.x += (desiredX - player.position.x) * Math.min(1, dt * 12);
        player.rotation.z = (desiredX - player.position.x) * .08;
        player.rotation.y = Math.sin(performance.now() * .007) * .02;

        spawnTimer -= dt;
        if (spawnTimer <= 0) {
          spawnObstacle();
          spawnTimer = Math.max(.42, 1.05 - speed * .16);
        }

        const moveZ = dt * (17 + speed * 18);
        roadLines.forEach(line => {
          line.position.z += moveZ;
          if (line.position.z > 6) line.position.z -= 96;
        });
        stars.forEach(star => {
          star.position.z += moveZ * .45;
          if (star.position.z > 8) star.position.z = -80;
        });

        for (let i = obstacles.length - 1; i >= 0; i--) {
          const o = obstacles[i];
          o.position.z += moveZ;
          o.rotation.x += dt * 1.7;
          o.rotation.y += dt * 1.2;

          const dx = Math.abs(o.position.x - player.position.x);
          const dz = Math.abs(o.position.z - player.position.z);
          if (dx < 1.05 && dz < 1.12) endGame();

          if (o.position.z > 9) {
            scene.remove(o);
            obstacles.splice(i, 1);
          }
        }
      }

      renderer.render(scene, camera);
    }

    function endGame() {
      running = false;
      finalScoreEl.textContent = Math.floor(score);
      gameOverScreen.classList.remove('hidden');
      if (navigator.vibrate) navigator.vibrate([90, 40, 120]);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    document.getElementById('startBtn').addEventListener('click', () => {
      startScreen.classList.add('hidden');
      resetGame();
    });
    document.getElementById('restartBtn').addEventListener('click', () => {
      gameOverScreen.classList.add('hidden');
      resetGame();
    });

    document.getElementById('leftBtn').addEventListener('pointerdown', moveLeft);
    document.getElementById('rightBtn').addEventListener('pointerdown', moveRight);

    window.addEventListener('keydown', e => {
      if (['ArrowLeft', 'a', 'A'].includes(e.key)) moveLeft();
      if (['ArrowRight', 'd', 'D'].includes(e.key)) moveRight();
    });

    let touchStartX = null;
    window.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: false });
    window.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
    window.addEventListener('touchend', e => {
      if (touchStartX === null) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 38) dx < 0 ? moveLeft() : moveRight();
      touchStartX = null;
    });

    init3D();
    animate();
  </script>
</body>
</html>
