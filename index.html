<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#05070f" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="description" content="Ultimate Games — a pocket arcade of 3D browser games. Tap a cartridge and play instantly. No installs, no sign-ups." />
<title>Ultimate Games — Pocket Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --void:#05070f;
    --panel:#0b1226;
    --panel-2:#111b3c;
    --line:rgba(255,255,255,.14);
    --ink:#e9efff;
    --dim:#9fb0d8;
    --cyan:#7df3ff;
    --magenta:#ff4df0;
    --gold:#ffd166;
    --radius:26px;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; min-height:100%; }
  body{
    background:var(--void);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    line-height:1.5;
    overflow-x:hidden;
    padding:
      calc(env(safe-area-inset-top,0px))
      calc(env(safe-area-inset-right,0px))
      calc(env(safe-area-inset-bottom,0px))
      calc(env(safe-area-inset-left,0px));
  }
  /* faint starfield */
  body::before{
    content:"";
    position:fixed; inset:0; z-index:-1;
    background-image:
      radial-gradient(1.6px 1.6px at 12% 22%, rgba(255,255,255,.35) 50%, transparent 51%),
      radial-gradient(1.2px 1.2px at 78% 12%, rgba(125,243,255,.4) 50%, transparent 51%),
      radial-gradient(1.4px 1.4px at 62% 58%, rgba(255,255,255,.22) 50%, transparent 51%),
      radial-gradient(1.2px 1.2px at 30% 74%, rgba(255,77,240,.3) 50%, transparent 51%),
      radial-gradient(1.6px 1.6px at 88% 82%, rgba(255,209,102,.3) 50%, transparent 51%),
      radial-gradient(1px 1px at 46% 34%, rgba(255,255,255,.3) 50%, transparent 51%);
    background-size:520px 520px;
  }

  .wrap{ max-width:1180px; margin:0 auto; padding:26px 18px 60px; }

  /* ── Marquee header ─────────────────────────── */
  .marquee{ text-align:center; padding:26px 8px 10px; }
  .marquee h1{
    font-family:'Bungee',cursive;
    font-size:clamp(2.1rem, 8.5vw, 4.6rem);
    line-height:1;
    margin:0;
    letter-spacing:.02em;
    color:var(--ink);
    text-shadow:
      0 0 18px rgba(125,243,255,.45),
      0 0 46px rgba(255,77,240,.30),
      0 4px 0 rgba(0,0,0,.55);
  }
  .marquee h1 .alt{ color:var(--gold); text-shadow:0 0 18px rgba(255,209,102,.55), 0 4px 0 rgba(0,0,0,.55); }
  .bulbs{
    display:flex; justify-content:space-between; align-items:center;
    max-width:560px; margin:18px auto 0; padding:0 6px;
  }
  .bulb{
    width:8px; height:8px; border-radius:50%;
    animation:bulb 1.8s linear infinite;
  }
  .bulb.c1{ background:var(--cyan);    box-shadow:0 0 10px var(--cyan); }
  .bulb.c2{ background:var(--magenta); box-shadow:0 0 10px var(--magenta); }
  .bulb.c3{ background:var(--gold);    box-shadow:0 0 10px var(--gold); }
  @keyframes bulb{
    0%,100%{ opacity:.22; transform:scale(.82); }
    18%{ opacity:1; transform:scale(1.15); }
    46%{ opacity:.35; transform:scale(.9); }
  }
  .tagline{
    margin:16px auto 6px; max-width:520px;
    color:var(--dim); font-size:1rem;
  }
  .status{
    font-family:'JetBrains Mono',monospace;
    font-size:.72rem; font-weight:700; letter-spacing:.22em;
    color:var(--cyan); opacity:.85; text-transform:uppercase;
    margin-top:10px;
  }

  /* ── Cartridge grid ─────────────────────────── */
  .grid{
    display:grid; gap:22px;
    grid-template-columns:1fr;
    margin-top:34px;
  }
  @media (min-width:720px){ .grid{ grid-template-columns:1fr 1fr; } }
  @media (min-width:1080px){ .grid{ grid-template-columns:1fr 1fr 1fr; } }

  .cart{
    position:relative;
    background:linear-gradient(160deg, var(--panel-2), var(--panel) 60%);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    display:flex; flex-direction:column;
    box-shadow:0 22px 60px rgba(0,0,0,.5);
    transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    animation:rise .5s ease both;
    cursor:pointer;
  }
  .cart:hover{ transform:translateY(-4px); border-color:var(--acc); }
  @keyframes rise{ from{ opacity:0; transform:translateY(16px); } to{ opacity:1; transform:translateY(0); } }
  .cart::before{ /* accent edge */
    content:""; position:absolute; top:0; left:0; right:0; height:3px;
    background:var(--acc);
    box-shadow:0 0 16px var(--acc);
  }
  .art{
    height:128px; display:grid; place-items:center;
    background:
      radial-gradient(120% 90% at 50% 0%, color-mix(in srgb, var(--acc) 16%, transparent), transparent 70%),
      #070c1d;
    border-bottom:1px solid var(--line);
  }
  .art svg{ width:100%; height:100%; display:block; }
  .cart-body{ padding:18px 18px 20px; display:flex; flex-direction:column; gap:10px; flex:1; }
  .cart h2{
    font-family:'Bungee',cursive;
    font-size:1.28rem; line-height:1.12; margin:0;
    color:var(--ink); letter-spacing:.01em;
  }
  .cart p{ margin:0; color:var(--dim); font-size:.92rem; flex:1; }
  .chips{ display:flex; flex-wrap:wrap; gap:7px; }
  .chip{
    font-family:'JetBrains Mono',monospace;
    font-size:.64rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
    color:var(--dim);
    border:1px solid var(--line);
    border-radius:999px; padding:4px 9px;
    background:rgba(255,255,255,.03);
  }
  .play{
    margin-top:6px;
    border:0; border-radius:16px;
    padding:14px 18px;
    font-family:'Inter',sans-serif; font-weight:800; font-size:.95rem;
    letter-spacing:.06em; text-transform:uppercase;
    color:#050912;
    background:var(--acc);
    box-shadow:0 10px 26px color-mix(in srgb, var(--acc) 38%, transparent);
    cursor:pointer;
    transition:transform .15s ease, filter .15s ease;
  }
  .play:hover{ filter:brightness(1.08); }
  .play:active{ transform:scale(.97); }
  .play:focus-visible, .cart:focus-visible{ outline:3px solid var(--gold); outline-offset:3px; }
  .last-tag{
    position:absolute; top:12px; right:12px; z-index:2;
    font-family:'JetBrains Mono',monospace;
    font-size:.6rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
    color:#050912; background:var(--gold);
    border-radius:999px; padding:4px 9px;
    box-shadow:0 0 14px rgba(255,209,102,.5);
  }

  .empty{
    margin-top:44px; text-align:center; color:var(--dim);
    border:1px dashed var(--line); border-radius:var(--radius);
    padding:44px 20px;
  }
  .empty strong{ display:block; color:var(--ink); font-size:1.05rem; margin-bottom:6px; }

  footer{
    margin-top:56px; text-align:center;
    font-family:'JetBrains Mono',monospace;
    font-size:.66rem; font-weight:700; letter-spacing:.2em; text-transform:uppercase;
    color:var(--dim); opacity:.7;
  }

  /* ── Game player overlay ────────────────────── */
  .player{
    position:fixed; inset:0; z-index:60;
    background:#000;
    display:none;
  }
  .player.open{ display:block; }
  .player iframe{
    position:absolute; inset:0;
    width:100%; height:100%; border:0;
    background:#000;
  }
  .topbar{
    position:absolute; top:0; left:0; right:0; z-index:4;
    display:flex; align-items:center; gap:12px;
    padding:calc(8px + env(safe-area-inset-top,0px)) 14px 8px;
    background:linear-gradient(rgba(4,6,14,.88), rgba(4,6,14,.55) 70%, transparent);
    backdrop-filter:blur(8px);
    transition:transform .3s ease, opacity .3s ease;
  }
  .topbar.hide{ transform:translateY(-110%); opacity:0; pointer-events:none; }
  .topbar .gtitle{
    font-family:'Bungee',cursive; font-size:.88rem;
    color:var(--ink); flex:1;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .bar-btn{
    border:1px solid var(--line);
    background:rgba(255,255,255,.08);
    color:var(--ink);
    border-radius:12px;
    padding:9px 13px;
    font-family:'JetBrains Mono',monospace;
    font-size:.7rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
    cursor:pointer;
    backdrop-filter:blur(6px);
  }
  .bar-btn:active{ transform:scale(.95); }
  .bar-btn.exit{ background:rgba(255,77,240,.16); border-color:rgba(255,77,240,.5); }
  .tab{
    position:absolute; top:calc(0px + env(safe-area-inset-top,0px)); left:50%;
    transform:translateX(-50%);
    z-index:3;
    width:66px; height:20px;
    border:1px solid var(--line); border-top:0;
    border-radius:0 0 14px 14px;
    background:rgba(10,14,30,.6);
    backdrop-filter:blur(6px);
    display:grid; place-items:center;
    color:var(--dim); font-size:.7rem;
    cursor:pointer;
    opacity:0; pointer-events:none;
    transition:opacity .3s ease;
  }
  .tab.show{ opacity:1; pointer-events:auto; }
  .loader{
    position:absolute; inset:0; z-index:2;
    display:grid; place-items:center;
    background:radial-gradient(circle at center, rgba(125,243,255,.08), #04060e 62%);
    transition:opacity .35s ease;
  }
  .loader.done{ opacity:0; pointer-events:none; }
  .loader-inner{ text-align:center; }
  .ring{
    width:52px; height:52px; margin:0 auto 16px;
    border-radius:50%;
    border:4px solid rgba(255,255,255,.12);
    border-top-color:var(--acc, var(--cyan));
    animation:spin .8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .loader-inner .gtitle{
    font-family:'Bungee',cursive; font-size:1.05rem; color:var(--ink);
  }
  .loader-inner .sub{
    font-family:'JetBrains Mono',monospace; font-size:.66rem; letter-spacing:.2em;
    text-transform:uppercase; color:var(--dim); margin-top:6px;
  }

  @media (prefers-reduced-motion: reduce){
    .bulb{ animation:none; opacity:.8; }
    .cart{ animation:none; }
    .cart:hover{ transform:none; }
    .ring{ animation-duration:1.6s; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header class="marquee">
    <h1>ULTIMATE <span class="alt">GAMES</span></h1>
    <div class="bulbs" id="bulbs" aria-hidden="true"></div>
    <p class="tagline">A pocket arcade of 3D browser games. Tap a cartridge and play instantly — no installs, no sign-ups.</p>
    <div class="status" id="statusLine">BOOTING…</div>
  </header>

  <main class="grid" id="grid" aria-label="Game library"></main>

  <footer>© 2026 Ultimate Games · Insert coin any time</footer>
</div>

<!-- fullscreen game player -->
<div class="player" id="player" aria-hidden="true">
  <div class="loader" id="loader">
    <div class="loader-inner">
      <div class="ring" id="loaderRing"></div>
      <div class="gtitle" id="loaderTitle"></div>
      <div class="sub">Loading cartridge</div>
    </div>
  </div>
  <div class="topbar" id="topbar">
    <div class="gtitle" id="barTitle"></div>
    <button class="bar-btn" id="fsBtn" type="button">⛶ Full</button>
    <button class="bar-btn exit" id="exitBtn" type="button">✕ Exit</button>
  </div>
  <div class="tab" id="tab" role="button" aria-label="Show game menu" tabindex="0">▾</div>
  <iframe id="gameFrame" title="Game" allow="fullscreen; autoplay; gamepad; accelerometer; gyroscope; magnetometer"></iframe>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   GAME LIBRARY — this is the only block you edit to add a game.

   1. Upload the game as  games/<slug>/index.html  (self-contained)
   2. Add one entry below. Fields:
        slug     → folder name under /games/
        title    → shown on the card and in-game top bar
        tagline  → one line, what the player does
        genre    → chip text
        players  → chip text (e.g. "Solo", "1–8 online")
        controls → chip text
        accent   → the card's neon color (hex)
        art      → "runner" | "marble" | "shack" | "burst"
   3. Save. Done. The card, deep link (?game=slug),
      loader, and exit controls are all automatic.
   ═══════════════════════════════════════════════════════════════ */
const GAMES = [
  {
    slug: "neon-speed-runner",
    title: "Neon Speed Runner",
    tagline: "Dodge glowing blocks down an endless tunnel that only gets faster.",
    genre: "Endless racer",
    players: "Solo",
    controls: "Swipe · Buttons · Keys",
    accent: "#7df3ff",
    art: "runner"
  },
  {
    slug: "marble-league-3d",
    title: "Marble League 3D",
    tagline: "Race marbles across 20 themed tracks — snow, lava, candy, city and more.",
    genre: "Marble racing",
    players: "Solo · Offline",
    controls: "Joystick · Swipe · Keys",
    accent: "#ff4df0",
    art: "marble"
  },
  {
    slug: "snack-shack",
    title: "Sunny Side Snack Shack",
    tagline: "Take orders, build snacks, and keep the beach crowd smiling.",
    genre: "Cooking rush",
    players: "Solo",
    controls: "Tap to build & serve",
    accent: "#ffd166",
    art: "shack"
  }
];
/* ═══════════════  end of game library  ═══════════════ */

const $ = id => document.getElementById(id);
const grid = $("grid"), playerEl = $("player"), frame = $("gameFrame");
const loader = $("loader"), topbar = $("topbar"), tab = $("tab");
let current = null, barTimer = null, pushed = false;

/* safe localStorage (works on the live site, degrades silently elsewhere) */
const store = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
};

/* ── cover art ── */
function artSVG(kind, acc){
  const a = acc, dim = "rgba(255,255,255,.28)";
  if(kind === "runner") return `
    <svg viewBox="0 0 300 128" preserveAspectRatio="xMidYMid slice">
      <line x1="150" y1="34" x2="30"  y2="128" stroke="${a}" stroke-width="2" opacity=".9"/>
      <line x1="150" y1="34" x2="270" y2="128" stroke="${a}" stroke-width="2" opacity=".9"/>
      <line x1="150" y1="34" x2="96"  y2="128" stroke="${dim}" stroke-width="1.4"/>
      <line x1="150" y1="34" x2="204" y2="128" stroke="${dim}" stroke-width="1.4"/>
      <line x1="150" y1="40" x2="150" y2="128" stroke="${dim}" stroke-width="1.4" stroke-dasharray="7 9"/>
      <line x1="60" y1="34" x2="240" y2="34" stroke="${a}" stroke-width="2" opacity=".55"/>
      <rect x="138" y="86" width="24" height="15" rx="4" fill="${a}"/>
      <rect x="144" y="79" width="12" height="8" rx="3" fill="#fff" opacity=".85"/>
    </svg>`;
  if(kind === "marble") return `
    <svg viewBox="0 0 300 128" preserveAspectRatio="xMidYMid slice">
      <path d="M-10 104 Q 96 64 150 92 T 310 78" fill="none" stroke="${dim}" stroke-width="10" stroke-linecap="round"/>
      <path d="M-10 104 Q 96 64 150 92 T 310 78" fill="none" stroke="${a}" stroke-width="2.4" stroke-linecap="round" opacity=".9"/>
      <circle cx="150" cy="66" r="26" fill="${a}"/>
      <ellipse cx="141" cy="56" rx="9" ry="6" fill="#fff" opacity=".85"/>
      <circle cx="150" cy="66" r="26" fill="none" stroke="#fff" stroke-width="1.4" opacity=".35"/>
      <circle cx="228" cy="42" r="5" fill="${dim}"/>
      <circle cx="68"  cy="36" r="3.4" fill="${dim}"/>
    </svg>`;
  if(kind === "shack") return `
    <svg viewBox="0 0 300 128" preserveAspectRatio="xMidYMid slice">
      <circle cx="236" cy="30" r="15" fill="${a}"/>
      <g stroke="${a}" stroke-width="3" stroke-linecap="round">
        <line x1="236" y1="6"  x2="236" y2="0"/>
        <line x1="256" y1="14" x2="261" y2="10"/>
        <line x1="262" y1="32" x2="269" y2="32"/>
        <line x1="216" y1="14" x2="211" y2="10"/>
      </g>
      <path d="M56 70 A 60 44 0 0 1 176 70 Z" fill="${a}"/>
      <g fill="#05070f" opacity=".28">
        <path d="M76 70 A 60 44 0 0 1 96 34 L 104 70 Z"/>
        <path d="M116 70 L 118 30 L 138 32 L 136 70 Z"/>
        <path d="M156 70 L 148 36 A 60 44 0 0 1 168 62 Z"/>
      </g>
      <path d="M56 70 h120 l-7 13 h-106 Z" fill="${a}" opacity=".7"/>
      <rect x="86" y="83" width="60" height="45" fill="${dim}" opacity=".5"/>
      <rect x="100" y="96" width="32" height="10" rx="5" fill="${a}" opacity=".9"/>
    </svg>`;
  /* burst fallback */
  return `
    <svg viewBox="0 0 300 128" preserveAspectRatio="xMidYMid slice">
      <g stroke="${a}" stroke-width="2.4" stroke-linecap="round" opacity=".85">
        ${Array.from({length:12},(_,i)=>{const t=i/12*Math.PI*2;
          return `<line x1="${150+Math.cos(t)*24}" y1="${64+Math.sin(t)*24}" x2="${150+Math.cos(t)*46}" y2="${64+Math.sin(t)*46}"/>`;}).join("")}
      </g>
      <circle cx="150" cy="64" r="17" fill="${a}"/>
    </svg>`;
}

/* ── render library ── */
function render(){
  grid.innerHTML = "";
  if(!GAMES.length){
    grid.innerHTML = `<div class="empty"><strong>No games loaded</strong>Drop a game folder into /games/ and list it in the library block to light this arcade up.</div>`;
    $("statusLine").textContent = "0 GAMES LOADED";
    return;
  }
  const last = store.get("ug:last");
  GAMES.forEach((g, i) => {
    const card = document.createElement("article");
    card.className = "cart";
    card.style.setProperty("--acc", g.accent);
    card.style.animationDelay = (i * 70) + "ms";
    card.innerHTML = `
      ${g.slug === last ? `<span class="last-tag">Last played</span>` : ""}
      <div class="art" aria-hidden="true">${artSVG(g.art, g.accent)}</div>
      <div class="cart-body">
        <h2>${g.title}</h2>
        <p>${g.tagline}</p>
        <div class="chips">
          <span class="chip">${g.genre}</span>
          <span class="chip">${g.players}</span>
          <span class="chip">${g.controls}</span>
        </div>
        <button class="play" type="button">▶ Play</button>
      </div>`;
    card.addEventListener("click", () => openGame(g));
    grid.appendChild(card);
  });
  $("statusLine").textContent = GAMES.length + (GAMES.length === 1 ? " GAME LOADED" : " GAMES LOADED");
}

/* ── marquee bulbs ── */
function buildBulbs(){
  const box = $("bulbs");
  box.innerHTML = "";
  const n = Math.max(10, Math.floor(Math.min(box.clientWidth || 320, 560) / 26));
  for(let i = 0; i < n; i++){
    const b = document.createElement("span");
    b.className = "bulb c" + (i % 3 + 1);
    b.style.animationDelay = (i * 90) + "ms";
    box.appendChild(b);
  }
}
let bulbT; window.addEventListener("resize", () => { clearTimeout(bulbT); bulbT = setTimeout(buildBulbs, 200); });

/* ── player overlay ── */
function openGame(g, push = true){
  current = g;
  store.set("ug:last", g.slug);
  document.documentElement.style.setProperty("--acc", g.accent);
  $("loaderRing").style.borderTopColor = g.accent;
  $("loaderTitle").textContent = g.title;
  $("barTitle").textContent = g.title;
  loader.classList.remove("done");
  topbar.classList.remove("hide");
  tab.classList.remove("show");
  playerEl.classList.add("open");
  playerEl.setAttribute("aria-hidden", "false");
  document.body.style.overflow = "hidden";
  frame.src = "games/" + g.slug + "/index.html";
  if(push){ history.pushState({ ug: g.slug }, "", "?game=" + g.slug); pushed = true; }
  armBarTimer();
}
function closeGame(){
  playerEl.classList.remove("open");
  playerEl.setAttribute("aria-hidden", "true");
  document.body.style.overflow = "";
  frame.src = "about:blank";           /* kill game loops + audio */
  current = null;
  clearTimeout(barTimer);
  if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});
  render();                            /* refresh Last-played tag */
}
function requestClose(){
  if(pushed){ pushed = false; history.back(); }
  else closeGame();
}
frame.addEventListener("load", () => {
  if(frame.src.endsWith("about:blank")) return;
  loader.classList.add("done");
});

/* auto-hiding top bar */
function armBarTimer(){
  clearTimeout(barTimer);
  barTimer = setTimeout(() => {
    topbar.classList.add("hide");
    tab.classList.add("show");
  }, 3200);
}
tab.addEventListener("click", () => {
  topbar.classList.remove("hide");
  tab.classList.remove("show");
  armBarTimer();
});
tab.addEventListener("keydown", e => { if(e.key === "Enter" || e.key === " ") tab.click(); });
topbar.addEventListener("pointerdown", armBarTimer);

$("exitBtn").addEventListener("click", requestClose);
$("fsBtn").addEventListener("click", () => {
  if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});
  else playerEl.requestFullscreen().catch(()=>{});
  armBarTimer();
});
window.addEventListener("keydown", e => { if(e.key === "Escape" && current) requestClose(); });

/* back gesture / back button exits the game, not the site */
window.addEventListener("popstate", e => {
  if(current){ pushed = false; closeGame(); }
  else if(e.state && e.state.ug){
    const g = GAMES.find(x => x.slug === e.state.ug);
    if(g) openGame(g, false), pushed = true;
  }
});

/* ── boot ── */
render();
buildBulbs();
const wanted = new URLSearchParams(location.search).get("game");
if(wanted){
  const g = GAMES.find(x => x.slug === wanted);
  history.replaceState({}, "", location.pathname);   /* clean base entry */
  if(g) openGame(g, true);
}
</script>
